site_name: MisTareas 2.1
site_description: Aplicación de escritorio multi-usuario para gestión de tareas
site_author: Fabián Viera
site_url: https://fabianviera.github.io/MisTareas2.0/

repo_name: Fabianviera/MisTareas2.0
repo_url: https://github.com/Fabianviera/MisTareas2.0

theme:
  name: material
  language: es
  palette:
    primary: blue
    accent: light blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Inicio: index.md
  - Instalación: instalacion.md
  - Guía de uso: uso.md
  - Arquitectura: arquitectura.md
  - Referencia del código: referencia.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
