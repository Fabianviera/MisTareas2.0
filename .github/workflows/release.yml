name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  crear-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "MisTareas 2.0 — ${{ github.ref_name }}"
          body: |
            ## MisTareas 2.1 — ${{ github.ref_name }}

            ### Descargas

            | Archivo | Plataforma | Descripción |
            |---------|-----------|-------------|
            | `Installer_MisTareas2.1.exe` | Windows | Instalador (recomendado) |
            | `MisTareas2.1.exe` | Windows | Ejecutable portable (sin instalación) |
            | `MisTareas2.1.dmg` | macOS | Imagen de disco |

            ### Instalación en Windows
            1. Descarga `Installer_MisTareas2.1.exe`
            2. Ejecuta el instalador y sigue los pasos
            3. Abre MisTareas 2.1 desde el acceso directo del escritorio

            > Si Windows muestra "Windows protegió su equipo", haz clic en **"Más información"** → **"Ejecutar de todas formas"**.

            ### Instalación en macOS
            1. Descarga `MisTareas2.1.dmg`
            2. Abre el `.dmg` y arrastra `MisTareas2.1.app` a tu carpeta **Aplicaciones**
            3. Abre la app desde el Launchpad o desde Aplicaciones

            > Si macOS bloquea la app, ve a **Ajustes del Sistema → Privacidad y seguridad** y haz clic en **"Abrir igualmente"**.

            ---
            Creado por **Juan Fabián Viera Rosales** · [fabianviera.r@gmail.com](mailto:fabianviera.r@gmail.com)
          draft: false
          prerelease: false
          files: |
            installer/Installer_MisTareas2.1.exe
            dist/MisTareas2.1.exe
